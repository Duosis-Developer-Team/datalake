---
# -----------------------------------------------------------------
# GLOBAL TANIMLAR
# -----------------------------------------------------------------
# Hedef sunucularda dosyaların kopyalanacağı yer.
# Burayı değiştirmek istersen tek bir yerden değiştirebilirsin.
- hosts: all
  vars:
    nifi_dest_path: /opt/nifi/conf/
    nifi_user: nifi
    nifi_group: nifi

# -----------------------------------------------------------------
# DC11 GÖREVLERİ
# -----------------------------------------------------------------
- name: DC11 NiFi Guncellemesi
  hosts: NiFi_DC11
  become: yes
  tasks:
    - name: DC11 dosyalarini kopyala
      copy:
        src: ../files/dc11/
        dest: "{{ nifi_dest_path }}"
        owner: "{{ nifi_user }}"
        group: "{{ nifi_group }}"
        mode: '0640'
      notify: Restart NiFi

  handlers:
    - name: Restart NiFi
      service: name=nifi state=restarted

