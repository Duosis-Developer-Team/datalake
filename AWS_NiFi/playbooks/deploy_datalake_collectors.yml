---
- name: Datalake Collectors Senkronizasyonu
  hosts: all
  become: yes

  vars:
    target_path: /Datalake_Project/

  tasks:
    - name: GitHub collectors klasörünü sunucuya eşitle (Password Auth Zorlama)
      synchronize:
        src: ../collectors/
        dest: "{{ target_path }}"
        archive: no
        recursive: yes
        delete: no
        # ---------------------------------------------------------
        # KRİTİK AYARLAR BURADA:
        # 1. SSH Key aramayı kapatıyoruz.
        private_key: no
        # 2. Ansible'ın genel SSH argümanlarını (şifre vs.) kullan diyoruz.
        use_ssh_args: yes
        # ---------------------------------------------------------
        rsync_opts:
          - "--exclude=configuration_file.json"
          - "--exclude=configuration_file.json.example"
          - "--exclude=.git"
          - "--exclude=.gitkeep"
      # Rsync çalışırken "Host Key" sorup takılmasın diye bu variable'ı SADECE bu task için eziyoruz:
      vars:
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Dosya sahipliğini root olarak ayarla
      file:
        path: "{{ target_path }}"
        owner: root
        group: root
        recurse: yes
        mode: '0755'
