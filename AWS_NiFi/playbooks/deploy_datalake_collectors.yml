---
- name: Datalake Collectors Senkronizasyonu
  hosts: all
  become: yes

  vars:
    target_path: /Datalake_Project/

  tasks:
    - name: Hedef klasörün var olduğundan emin ol
      file:
        path: "{{ target_path }}"
        state: directory
        mode: '0755'

    - name: Mevcut configuration_file.json'u yedekle (varsa)
      shell: |
        if [ -f "{{ target_path }}/configuration_file.json" ]; then
          cp "{{ target_path }}/configuration_file.json" /tmp/configuration_file.json.backup
        fi
      changed_when: false
      failed_when: false

    - name: GitHub collectors klasörünü sunucuya kopyala
      copy:
        src: ../collectors/
        dest: "{{ target_path }}"
        mode: preserve
        directory_mode: '0755'

    - name: Yedeklenen configuration_file.json'u geri yükle (varsa)
      shell: |
        if [ -f "/tmp/configuration_file.json.backup" ]; then
          mv /tmp/configuration_file.json.backup "{{ target_path }}/configuration_file.json"
        fi
      changed_when: false
      failed_when: false

    - name: Gereksiz dosyaları temizle
      file:
        path: "{{ target_path }}/{{ item }}"
        state: absent
      loop:
        - configuration_file.json.example
        - .git
        - .gitkeep
      failed_when: false
